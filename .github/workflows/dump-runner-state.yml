name: Dump GitHub Runner State

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: System info
        run: |
          echo "=== OS ==="
          cat /etc/os-release
          uname -a
          echo "=== Runner user ==="
          whoami
          id
          echo "=== All users with UID >= 1000 ==="
          awk -F: '$3 >= 1000 {print $1, "uid="$3, "gid="$4, "home="$6, "shell="$7}' /etc/passwd
          echo "=== Groups ==="
          groups runner
          cat /etc/group | grep runner

      - name: /etc/environment (full)
        run: cat /etc/environment

      - name: Environment variables (full)
        run: env | sort

      - name: PATH breakdown
        run: echo "$PATH" | tr ':' '\n'

      - name: Permissions audit
        run: |
          echo "=== Key directories ==="
          for d in /home/runner /home/runner/actions-runner /home/runner/work /home/runner/.cargo /home/runner/.cargo/bin /home/runner/.rustup /home/runner/.nvm /home/runner/.dotnet /home/runner/.config /home/runner/.local /home/runner/.local/bin /opt/hostedtoolcache /opt/pipx /opt/pipx_bin /opt/actionarchivecache /usr/local /usr/local/bin /usr/local/lib /usr/local/share /usr/local/.ghcup /usr/share/miniconda /usr/share/swift /usr/local/lib/android /usr/local/lib/android/sdk /imagegeneration; do
            stat -c '%U:%G %a %n' "$d" 2>/dev/null || echo "MISSING $d"
          done
          echo "=== /etc/sudoers.d/ ==="
          sudo ls -la /etc/sudoers.d/
          echo "=== runner sudoers ==="
          sudo cat /etc/sudoers.d/*runner* 2>/dev/null || echo "no runner sudoers"

      - name: Home directory layout
        run: |
          echo "=== /home/runner (all, including dotfiles) ==="
          ls -la /home/runner/
          echo "=== /home/runner/.local/bin ==="
          ls -la /home/runner/.local/bin/ 2>/dev/null || echo "not found"
          echo "=== /home/runner/.config ==="
          ls -la /home/runner/.config/ 2>/dev/null || echo "not found"

      - name: /usr/local/bin (complete)
        run: ls -la /usr/local/bin/

      - name: /usr/local/share contents
        run: ls -la /usr/local/share/

      - name: /opt directory
        run: |
          echo "=== /opt top-level ==="
          ls -la /opt/
          echo "=== /opt/pipx_bin ==="
          ls -la /opt/pipx_bin/ 2>/dev/null || echo "not found"
          echo "=== /opt/actionarchivecache ==="
          ls -la /opt/actionarchivecache/ 2>/dev/null || echo "not found"
          echo "=== /opt/az ==="
          ls -la /opt/az/ 2>/dev/null || echo "not found"

      - name: Hostedtoolcache (full depth 4)
        run: find /opt/hostedtoolcache -maxdepth 4 -type d 2>/dev/null | sort

      - name: Tool versions (comprehensive)
        run: |
          echo "--- node ---"
          node --version 2>/dev/null || echo "not found"
          which node 2>/dev/null
          echo "--- npm ---"
          npm --version 2>/dev/null || echo "not found"
          echo "--- yarn ---"
          yarn --version 2>/dev/null || echo "not found"
          echo "--- python3 ---"
          python3 --version 2>/dev/null || echo "not found"
          which python3 2>/dev/null
          echo "--- pip ---"
          pip3 --version 2>/dev/null || echo "not found"
          echo "--- go ---"
          go version 2>/dev/null || echo "not found"
          which go 2>/dev/null
          echo "--- rustc ---"
          rustc --version 2>/dev/null || echo "not found"
          which rustc 2>/dev/null
          echo "--- cargo ---"
          cargo --version 2>/dev/null || echo "not found"
          echo "--- java ---"
          java --version 2>/dev/null || echo "not found"
          which java 2>/dev/null
          echo "--- dotnet ---"
          dotnet --list-sdks 2>/dev/null || echo "not found"
          echo "--- docker ---"
          docker --version 2>/dev/null || echo "not found"
          echo "--- docker compose ---"
          docker compose version 2>/dev/null || echo "not found"
          echo "--- docker buildx ---"
          docker buildx version 2>/dev/null || echo "not found"
          echo "--- gcc ---"
          gcc --version 2>/dev/null | head -1 || echo "not found"
          echo "--- gcc versions available ---"
          ls /usr/bin/gcc-* 2>/dev/null || echo "none"
          echo "--- g++ versions available ---"
          ls /usr/bin/g++-* 2>/dev/null || echo "none"
          echo "--- gfortran ---"
          gfortran --version 2>/dev/null | head -1 || echo "not found"
          ls /usr/bin/gfortran-* 2>/dev/null || echo "none"
          echo "--- cmake ---"
          cmake --version 2>/dev/null | head -1 || echo "not found"
          which cmake 2>/dev/null
          echo "--- ninja ---"
          ninja --version 2>/dev/null || echo "not found"
          echo "--- gh ---"
          gh --version 2>/dev/null | head -1 || echo "not found"
          echo "--- az ---"
          az version 2>/dev/null || echo "not found"
          echo "--- aws ---"
          aws --version 2>/dev/null || echo "not found"
          echo "--- gcloud ---"
          gcloud version 2>/dev/null | head -3 || echo "not found"
          echo "--- kubectl ---"
          kubectl version --client 2>/dev/null || echo "not found"
          echo "--- helm ---"
          helm version --short 2>/dev/null || echo "not found"
          echo "--- terraform ---"
          terraform --version 2>/dev/null | head -1 || echo "not found"
          echo "--- packer ---"
          packer --version 2>/dev/null || echo "not found"
          echo "--- ruby ---"
          ruby --version 2>/dev/null || echo "not found"
          which ruby 2>/dev/null
          echo "--- gem ---"
          gem --version 2>/dev/null || echo "not found"
          echo "--- bundler ---"
          bundler --version 2>/dev/null || echo "not found"
          echo "--- php ---"
          php --version 2>/dev/null | head -1 || echo "not found"
          echo "--- composer ---"
          composer --version 2>/dev/null | head -1 || echo "not found"
          echo "--- swift ---"
          swift --version 2>/dev/null | head -1 || echo "not found"
          echo "--- kotlin ---"
          kotlin -version 2>/dev/null || echo "not found"
          echo "--- julia ---"
          julia --version 2>/dev/null || echo "not found"
          echo "--- powershell ---"
          pwsh --version 2>/dev/null || echo "not found"
          echo "--- bazel ---"
          bazel --version 2>/dev/null || echo "not found"
          echo "--- R ---"
          R --version 2>/dev/null | head -1 || echo "not found"
          echo "--- clang ---"
          clang --version 2>/dev/null | head -1 || echo "not found"
          echo "--- clang versions available ---"
          ls /usr/bin/clang-?? 2>/dev/null || echo "none"
          echo "--- lld versions ---"
          ls /usr/bin/lld-* 2>/dev/null || echo "none"
          echo "--- lldb ---"
          ls /usr/bin/lldb-* 2>/dev/null || echo "none"
          echo "--- chromium/chrome ---"
          google-chrome --version 2>/dev/null || echo "not found"
          echo "--- firefox ---"
          firefox --version 2>/dev/null || echo "not found"
          echo "--- edge ---"
          microsoft-edge --version 2>/dev/null || echo "not found"
          echo "--- selenium ---"
          ls /usr/share/java/selenium* 2>/dev/null || echo "not found"
          echo "--- chromedriver ---"
          chromedriver --version 2>/dev/null || echo "not found"
          ls /usr/local/share/chromedriver* 2>/dev/null || echo "not found"
          echo "--- geckodriver ---"
          geckodriver --version 2>/dev/null | head -1 || echo "not found"
          echo "--- edgedriver ---"
          ls /usr/local/share/edge_driver/ 2>/dev/null || echo "not found"
          echo "--- ant ---"
          ant -version 2>/dev/null || echo "not found"
          echo "--- gradle ---"
          gradle --version 2>/dev/null | head -3 || echo "not found"
          echo "--- maven ---"
          mvn --version 2>/dev/null | head -1 || echo "not found"
          echo "--- sbt ---"
          sbt --version 2>/dev/null | head -2 || echo "not found"
          echo "--- miniconda ---"
          conda --version 2>/dev/null || echo "not found"
          echo "--- pip global packages ---"
          pip3 list 2>/dev/null | head -20 || echo "not found"
          echo "--- pipx list ---"
          pipx list --short 2>/dev/null || echo "not found"
          echo "--- nvm ---"
          bash -c 'source /home/runner/.nvm/nvm.sh && nvm list' 2>/dev/null || echo "not found"
          echo "--- azcopy ---"
          azcopy --version 2>/dev/null || echo "not found"
          echo "--- bicep ---"
          bicep --version 2>/dev/null || echo "not found"
          echo "--- yq ---"
          yq --version 2>/dev/null || echo "not found"
          echo "--- jq ---"
          jq --version 2>/dev/null || echo "not found"
          echo "--- zstd ---"
          zstd --version 2>/dev/null | head -1 || echo "not found"
          echo "--- shellcheck ---"
          shellcheck --version 2>/dev/null | head -2 || echo "not found"
          echo "--- podman ---"
          podman --version 2>/dev/null || echo "not found"
          echo "--- buildah ---"
          buildah --version 2>/dev/null || echo "not found"
          echo "--- skopeo ---"
          skopeo --version 2>/dev/null || echo "not found"
          echo "--- kind ---"
          kind --version 2>/dev/null || echo "not found"
          echo "--- minikube ---"
          minikube version 2>/dev/null | head -1 || echo "not found"
          echo "--- kustomize ---"
          kustomize version 2>/dev/null || echo "not found"
          echo "--- pulumi ---"
          pulumi version 2>/dev/null || echo "not found"
          echo "--- vcpkg ---"
          vcpkg version 2>/dev/null | head -1 || echo "not found"
          echo "--- swig ---"
          swig -version 2>/dev/null | head -3 || echo "not found"
          echo "--- homebrew ---"
          brew --version 2>/dev/null | head -1 || echo "not found"

      - name: Rust / Cargo layout
        run: |
          echo "=== rustup show ==="
          rustup show 2>/dev/null || echo "not found"
          echo "=== cargo bin ==="
          ls -la ~/.cargo/bin/ 2>/dev/null || echo "not found"
          echo "=== rustup toolchains ==="
          ls -la ~/.rustup/toolchains/ 2>/dev/null || echo "not found"

      - name: Dotnet layout
        run: |
          echo "=== dotnet SDKs ==="
          dotnet --list-sdks 2>/dev/null || echo "not found"
          echo "=== dotnet runtimes ==="
          dotnet --list-runtimes 2>/dev/null || echo "not found"
          echo "=== dotnet tools ==="
          ls ~/.dotnet/tools/ 2>/dev/null || echo "not found"

      - name: Java layout
        run: |
          echo "=== /usr/lib/jvm ==="
          ls -la /usr/lib/jvm/ 2>/dev/null || echo "not found"
          echo "=== JAVA_HOME ==="
          echo "$JAVA_HOME"
          echo "=== alternatives ==="
          update-alternatives --list java 2>/dev/null || echo "not found"

      - name: Android SDK layout
        run: |
          echo "=== SDK top-level ==="
          ls /usr/local/lib/android/sdk/ 2>/dev/null || echo "not found"
          echo "=== NDK versions ==="
          ls /usr/local/lib/android/sdk/ndk/ 2>/dev/null || echo "not found"
          echo "=== build-tools ==="
          ls /usr/local/lib/android/sdk/build-tools/ 2>/dev/null || echo "not found"
          echo "=== platforms ==="
          ls /usr/local/lib/android/sdk/platforms/ 2>/dev/null || echo "not found"
          echo "=== cmdline-tools ==="
          ls /usr/local/lib/android/sdk/cmdline-tools/ 2>/dev/null || echo "not found"

      - name: Haskell / GHCup layout
        run: |
          echo "=== ghcup ==="
          ghcup --version 2>/dev/null || echo "not found"
          echo "=== ghc ==="
          ghc --version 2>/dev/null || echo "not found"
          echo "=== cabal ==="
          cabal --version 2>/dev/null || echo "not found"
          echo "=== stack ==="
          stack --version 2>/dev/null || echo "not found"
          echo "=== ghcup dir ==="
          ls /usr/local/.ghcup/bin/ 2>/dev/null | head -20 || echo "not found"

      - name: Docker info
        run: |
          docker info 2>/dev/null || echo "not found"
          echo "=== pre-pulled images ==="
          docker images 2>/dev/null || echo "not found"
          echo "=== docker plugins ==="
          ls /usr/libexec/docker/cli-plugins/ 2>/dev/null || echo "not found"
          echo "=== docker config ==="
          cat /etc/docker/daemon.json 2>/dev/null || echo "not found"

      - name: Snap packages
        run: snap list 2>/dev/null || echo "no snap"

      - name: Homebrew packages
        run: |
          brew list 2>/dev/null || echo "not found"

      - name: Imagedata file
        run: |
          echo "=== /imagegeneration ==="
          ls -la /imagegeneration/ 2>/dev/null || echo "dir not found"
          cat /imagegeneration/imagedata.json 2>/dev/null || echo "file not found"
          echo "=== /imagegeneration/installedSoftware.md ==="
          head -100 /imagegeneration/installedSoftware.md 2>/dev/null || echo "not found"

      - name: Systemd services
        run: |
          echo "=== enabled services ==="
          systemctl list-unit-files --state=enabled --type=service 2>/dev/null | head -30
          echo "=== running services ==="
          systemctl list-units --type=service --state=running 2>/dev/null | head -30

      - name: Installed apt packages
        run: dpkg --get-selections | grep -v deinstall | awk '{print $1}' | sort
